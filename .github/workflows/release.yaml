name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: '发布标签，例如 v0.1.0'
        required: true
        type: string
      target_ref:
        description: '发布目标分支或提交，默认 main'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            arch: arm64-v8a
            rust-target: aarch64-linux-android
            flutter-target: android-arm64
          - platform: android
            os: ubuntu-latest
            arch: armeabi-v7a
            rust-target: armv7-linux-androideabi
            flutter-target: android-arm
          - platform: android
            os: ubuntu-latest
            arch: x86_64
            rust-target: x86_64-linux-android
            flutter-target: android-x64
          - platform: ios
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ github.event.inputs.target_ref || github.ref }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag_name }}"
          else
            tag="${{ github.ref_name }}"
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Setup Java
        if: startsWith(matrix.platform, 'android')
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          cache: true

      - name: Setup Rust
        if: startsWith(matrix.platform, 'android')
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Android build environment
        if: startsWith(matrix.platform, 'android')
        run: |
          rustup target add ${{ matrix.rust-target }}
          cargo install cargo-ndk
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Setup Android NDK
        if: startsWith(matrix.platform, 'android')
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;25.2.9519653'

      - name: Setup Android Signing
        if: startsWith(matrix.platform, 'android')
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && [ -n "${{ secrets.ANDROID_KEY_PROPERTIES }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
            echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" > android/key.properties
          else
            echo "Android signing secrets not set, skipping signing setup."
          fi

      - name: Setup Google Services
        if: startsWith(matrix.platform, 'android')
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json
          else
            echo "GOOGLE_SERVICES_JSON not set, skipping google-services.json setup."
          fi

      - name: Build DOH Proxy
        if: startsWith(matrix.platform, 'android')
        working-directory: core/doh_proxy
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: cargo ndk -t ${{ matrix.arch }} --platform 28 build --release --features ech

      - name: Copy native libraries
        if: startsWith(matrix.platform, 'android')
        run: |
          mkdir -p android/app/src/main/jniLibs/${{ matrix.arch }}
          cp core/doh_proxy/target/${{ matrix.rust-target }}/release/libdoh_proxy.so android/app/src/main/jniLibs/${{ matrix.arch }}/
          mkdir -p android/app/src/main/res/raw
          cp core/doh_proxy/certs/ca.der android/app/src/main/res/raw/proxy_ca.der

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android
        if: startsWith(matrix.platform, 'android')
        run: |
          flutter build apk --release --target-platform ${{ matrix.flutter-target }} --dart-define=cronetHttpNoPlay=true
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/fluxdo-${{ matrix.arch }}.apk

      - name: Build iOS
        if: matrix.platform == 'ios'
        run: |
          flutter build ios --release --no-codesign
          mkdir -p dist
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r fluxdo-unsigned.ipa Payload
          mv fluxdo-unsigned.ipa ../../../dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true
          retention-days: 14

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_ref || github.ref }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag_name }}"
            target="${{ github.event.inputs.target_ref || 'main' }}"
          else
            tag="${{ github.ref_name }}"
            target="${{ github.sha }}"
          fi
          version="${tag#v}"
          prerelease=false
          if [[ "${tag}" == *-* ]]; then
            prerelease=true
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "target=${target}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          pattern: artifact-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd dist
          for file in *; do
            if [ -f "${file}" ] && [[ "${file}" != *.sha256 ]]; then
              sha256sum "${file}" > "${file}.sha256"
            fi
          done

      - name: Generate release notes
        env:
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          version="${{ steps.meta.outputs.version }}"
          previous_tag="$(git tag --list 'v*' --sort=-creatordate | grep -vx "$tag" | head -n 1 || true)"

          {
            echo "## 本次推送日志"
            echo
            echo "- 发布标签：\`${tag}\`"
            echo "- 发布仓库：\`${REPOSITORY}\`"
            if [ -n "${previous_tag}" ]; then
              echo "- 对比区间：\`${previous_tag}..${tag}\`"
              echo "- 对比链接：https://github.com/${REPOSITORY}/compare/${previous_tag}...${tag}"
            else
              echo "- 对比区间：首次正式发布"
            fi
            echo
            if [ -n "${previous_tag}" ]; then
              git log --no-merges --pretty=format:'- `%h` %s' "${previous_tag}..HEAD"
            else
              git log --no-merges --pretty=format:'- `%h` %s' -n 20 HEAD
            fi
            echo
            echo
            sed -e "s|REPOSITORY|${REPOSITORY}|g" -e "s|VERSION|${version}|g" .github/release_template.md
          } > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.meta.outputs.target }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: release_notes.md
          files: ./dist/*
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
