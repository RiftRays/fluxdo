name: Build Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android (arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Android build environment
        run: |
          rustup target add aarch64-linux-android
          cargo install cargo-ndk
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;25.2.9519653'

      - name: Setup Android Signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && [ -n "${{ secrets.ANDROID_KEY_PROPERTIES }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
            echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" > android/key.properties
          else
            echo "Android signing secrets not set, skipping signing setup."
          fi

      - name: Setup Google Services
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json
          else
            echo "GOOGLE_SERVICES_JSON not set, skipping google-services.json setup."
          fi

      - name: Build DOH Proxy
        working-directory: core/doh_proxy
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: cargo ndk -t arm64-v8a --platform 28 build --release --features ech

      - name: Copy native libraries
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp core/doh_proxy/target/aarch64-linux-android/release/libdoh_proxy.so android/app/src/main/jniLibs/arm64-v8a/
          mkdir -p android/app/src/main/res/raw
          cp core/doh_proxy/certs/ca.der android/app/src/main/res/raw/proxy_ca.der

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android
        run: |
          flutter build apk --release --target-platform android-arm64 --dart-define=cronetHttpNoPlay=true
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/fluxdo-arm64-v8a.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluxdo-android-arm64-v8a
          path: dist/fluxdo-arm64-v8a.apk
          overwrite: true
          retention-days: 14
